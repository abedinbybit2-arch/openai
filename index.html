<!DOCTYPE html>
<html>
<head>
  <title>Crypto App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0e11;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin: auto;
      margin-top: 80px;
    }

    .card {
      background: #181a20;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #2b3139;
      border: none;
      color: white;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #fcd535;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    h2 {
      text-align: center;
    }

    #dashboard {
      display: none;
    }

    .coin {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #2b3139;
    }

    .green { color: #0ecb81; }
    .red { color: #f6465d; }

    .topbar {
      background: #181a20;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #2b3139;
    }
  </style>
</head>
<body>

<div class="topbar">💰 Crypto Market</div>

<!-- LOGIN -->
<div class="container" id="login">
  <div class="card">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button><br><br>
    <button onclick="loginUser()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container" id="dashboard">
  <div class="card">
    <h2>🔥 Hot Market</h2>
    <p id="user"></p>

    <div id="coins">
      <div class="coin"><span>BTC</span><span id="BTC">...</span></div>
      <div class="coin"><span>ETH</span><span id="ETH">...</span></div>
      <div class="coin"><span>BNB</span><span id="BNB">...</span></div>
      <div class="coin"><span>SOL</span><span id="SOL">...</span></div>
      <div class="coin"><span>XRP</span><span id="XRP">...</span></div>
    </div>

    <br>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3lYDIr8ElAWk-jwnOWxubtVS-TeSSyOg",
  authDomain: "uyguy-ab047.firebaseapp.com",
  projectId: "uyguy-ab047",
  storageBucket: "uyguy-ab047.firebasestorage.app",
  messagingSenderId: "297739792713",
  appId: "1:297739792713:web:72af3ba75fabcacb3caa98"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI switch
function showDashboard(email) {
  document.getElementById("login").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("user").innerText = "👤 " + email;
  startMarket();
}

// Signup
window.signup = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(res => showDashboard(res.user.email))
    .catch(err => alert(err.message));
}

// Login
window.loginUser = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(res => showDashboard(res.user.email))
    .catch(err => alert(err.message));
}

// Logout
window.logout = function() {
  signOut(auth).then(() => {
    location.reload();
  });
}

// Market
let oldPrices = {};

function startMarket() {
  setInterval(async () => {
    const res = await fetch("https://api.binance.com/api/v3/ticker/price");
    const data = await res.json();

    const get = (sym) => {
      const c = data.find(x => x.symbol === sym);
      return parseFloat(c.price);
    };

    update("BTC", get("BTCUSDT"));
    update("ETH", get("ETHUSDT"));
    update("BNB", get("BNBUSDT"));
    update("SOL", get("SOLUSDT"));
    update("XRP", get("XRPUSDT"));

  }, 1000);
}

function update(id, price) {
  const el = document.getElementById(id);
  const old = oldPrices[id];

  el.innerText = "$" + price.toFixed(2);

  if (old) {
    if (price > old) {
      el.className = "green";
    } else if (price < old) {
      el.className = "red";
    }
  }

  oldPrices[id] = price;
}
</script>

</body>
</html>
