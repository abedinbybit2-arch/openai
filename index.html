v<!DOCTYPE html>
<html>
<head>
  <title>Pro Crypto App</title>
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0e11;
      color: white;
    }

    .top {
      padding: 15px;
      text-align: center;
      background: #181a20;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: #181a20;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      background: #fcd535;
      border: none;
      cursor: pointer;
    }

    #app { display: none; }

    .coin {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

<div class="top">🚀 Crypto Trading App</div>

<!-- LOGIN -->
<div class="container" id="login">
  <div class="box">
    <h3>Login</h3>
    <input id="email" placeholder="Email"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="signup()">Signup</button>
    <button onclick="loginUser()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="container">

  <div class="box">
    <h3>📊 Live Chart</h3>
    <div id="chart" style="height:400px;"></div>
  </div>

  <div class="box">
    <h3>🔥 Market</h3>
    <div id="market"></div>
  </div>

  <div class="box">
    <h3>💰 Trade (Demo)</h3>
    <button onclick="buy()">Buy</button>
    <button onclick="sell()">Sell</button>
  </div>

</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "uyguy-ab047.firebaseapp.com"
});
const auth = getAuth(app);

// login
window.signup = () => {
  createUserWithEmailAndPassword(auth,email.value,pass.value)
  .then(()=>start());
};

window.loginUser = () => {
  signInWithEmailAndPassword(auth,email.value,pass.value)
  .then(()=>start());
};

// start app
function start(){
  login.style.display="none";
  app.style.display="block";

  // chart
  new TradingView.widget({
    container_id: "chart",
    symbol: "BINANCE:BTCUSDT",
    interval: "1",
    theme: "dark"
  });

  loadMarket();
}

// market
async function loadMarket(){
  setInterval(async ()=>{
    const res=await fetch("https://api.binance.com/api/v3/ticker/price");
    const data=await res.json();

    let html="";
    data.slice(0,20).forEach(c=>{
      html+=`<div class="coin">${c.symbol} - $${parseFloat(c.price).toFixed(2)}</div>`;
    });

    market.innerHTML=html;
  },1000);
}

// demo trade
window.buy=()=>alert("Buy order placed (demo)");
window.sell=()=>alert("Sell order placed (demo)");

</script>

</body>
</html>
