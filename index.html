<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .login-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    
    <button>Login</button>
</div>

</body>
</html>
