<!DOCTYPE html>
<html>
<head>
  <title>Firebase + Hot Market</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .box {
      border: 1px solid #ccc;
      padding: 20px;
      width: 320px;
      margin: 20px auto;
      border-radius: 10px;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }
    #successPage {
      display: none;
    }
  </style>
</head>
<body>

<div class="box" id="loginPage">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div class="box" id="successPage">
  <h2>🎉 Success!</h2>
  <p id="userEmail"></p>

  <h3>🔥 Hot Market</h3>
  <div id="market">
    <p id="btc">BTC: Loading...</p>
    <p id="eth">ETH: Loading...</p>
    <p id="bnb">BNB: Loading...</p>
    <p id="sol">SOL: Loading...</p>
    <p id="xrp">XRP: Loading...</p>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3lYDIr8ElAWk-jwnOWxubtVS-TeSSyOg",
  authDomain: "uyguy-ab047.firebaseapp.com",
  projectId: "uyguy-ab047",
  storageBucket: "uyguy-ab047.firebasestorage.app",
  messagingSenderId: "297739792713",
  appId: "1:297739792713:web:72af3ba75fabcacb3caa98"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI change
function showSuccess(email) {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("successPage").style.display = "block";
  document.getElementById("userEmail").innerText = "Logged in as: " + email;

  startMarket(); // market start
}

// Signup
window.signup = function() {
  const emailVal = document.getElementById("email").value;
  const passwordVal = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, emailVal, passwordVal)
    .then((userCredential) => {
      showSuccess(userCredential.user.email);
    })
    .catch((error) => {
      alert(error.message);
    });
}

// Login
window.login = function() {
  const emailVal = document.getElementById("email").value;
  const passwordVal = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, emailVal, passwordVal)
    .then((userCredential) => {
      showSuccess(userCredential.user.email);
    })
    .catch((error) => {
      alert(error.message);
    });
}

// Logout
window.logout = function() {
  signOut(auth).then(() => {
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("successPage").style.display = "none";
  });
}

// Market function
let marketStarted = false;

function startMarket() {
  if (marketStarted) return;
  marketStarted = true;

  setInterval(async () => {
    try {
      const res = await fetch("https://api.binance.com/api/v3/ticker/price");
      const data = await res.json();

      const price = (sym) => {
        const c = data.find(x => x.symbol === sym);
        return c ? parseFloat(c.price).toFixed(2) : "N/A";
      };

      document.getElementById("btc").innerText = "BTC: $" + price("BTCUSDT");
      document.getElementById("eth").innerText = "ETH: $" + price("ETHUSDT");
      document.getElementById("bnb").innerText = "BNB: $" + price("BNBUSDT");
      document.getElementById("sol").innerText = "SOL: $" + price("SOLUSDT");
      document.getElementById("xrp").innerText = "XRP: $" + price("XRPUSDT");

    } catch (e) {
      console.log("API error", e);
    }
  }, 1000);
}

</script>

</body>
</html>
